<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form | Vijay Gupta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="project-page">
  <main class="mini-project">
    <a class="back-link" href="index.html#projects">Back to Portfolio</a>
    <section class="login-panel">
      <p class="eyebrow">Project Demo</p>
      <h1>Login Form</h1>
      <form class="login-form" id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required minlength="6">

        <button class="btn primary-btn" type="submit">Login</button>
        <p class="form-message" id="loginMessage"></p>
      </form>
    </section>
  </main>

  <script src="project-demos.js"></script>
</body>
</html>
