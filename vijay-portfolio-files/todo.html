<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do App | Vijay Gupta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="project-page">
  <main class="mini-project">
    <a class="back-link" href="index.html#projects">Back to Portfolio</a>
    <section class="todo-panel">
      <p class="eyebrow">Project Demo</p>
      <h1>To-Do App</h1>
      <form class="todo-form" id="todoForm">
        <input type="text" id="todoInput" placeholder="Add a new task" required>
        <button class="btn primary-btn" type="submit">Add</button>
      </form>
      <ul class="todo-list" id="todoList">
        <li>
          <span>Practice JavaScript</span>
          <button type="button" aria-label="Remove task">Done</button>
        </li>
      </ul>
    </section>
  </main>

  <script src="project-demos.js"></script>
</body>
</html>
